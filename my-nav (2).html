<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0d1117; --card-bg: #161b22; --card-hover: #21262d; --text: #c9d1d9; --text-muted: #8b949e; --border: #30363d; --accent: #58a6ff; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 12px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.search { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
.search:focus { border-color: var(--accent); }
.category { margin-bottom: 20px; }
.category-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; padding-left: 2px; }
.sites-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.site-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; text-decoration: none; color: var(--text); transition: all .15s; display: flex; align-items: center; gap: 8px; }
.site-card:hover { background: var(--card-hover); border-color: var(--accent); }
.site-icon { font-size: 16px; }
.site-name { font-size: 13px; white-space: nowrap; }
</style>
</head>
<body>
  <div class="header"><input type="text" class="search" id="searchInput" placeholder="搜索..."></div>
  <div id="content"></div>
  <script>const data={"version":"1.0","theme":"dark","categories":[{"id":"common","name":"常用","icon":"⭐"},{"id":"tech","name":"技术","icon":"💻"},{"id":"social","name":"社交","icon":"💬"}],"sites":[{"name":"百度","url":"https://baidu.com","icon":"🔍","category":"common"},{"name":"百3度","url":"https://baidu.com","icon":"🔍","category":"common"},{"name":"Google","url":"https://google.com","icon":"🌐","category":"common"},{"name":"必应","url":"https://bing.com","icon":"🌻","category":"common"},{"name":"搜狗","url":"https://sogou.com","icon":"🐶","category":"common"},{"name":"360搜索","url":"https://so.com","icon":"🔎","category":"common"},{"name":"今日头条","url":"https://toutiao.com","icon":"📰","category":"common"},{"name":"腾讯新闻","url":"https://news.qq.com","icon":"📢","category":"common"},{"name":"网易新闻","url":"https://news.163.com","icon":"📱","category":"common"},{"name":"天气预报","url":"https://weather.com.cn","icon":"☀️","category":"common"},{"name":"快递查询","url":"https://www.kuaidi100.com","icon":"📦","category":"common"},{"name":"GitHub","url":"https://github.com","icon":"🐙","category":"tech"},{"name":"Stack Overflow","url":"https://stackoverflow.com","icon":"📚","category":"tech"},{"name":"MDN","url":"https://developer.mozilla.org","icon":"🦊","category":"tech"},{"name":"Vite","url":"https://vitejs.dev","icon":"⚡","category":"tech"},{"name":"React","url":"https://react.dev","icon":"⚛️","category":"tech"},{"name":"Vue","url":"https://vuejs.org","icon":"💚","category":"tech"},{"name":"npm","url":"https://npmjs.com","icon":"📦","category":"tech"},{"name":"Docker Hub","url":"https://hub.docker.com","icon":"🐳","category":"tech"},{"name":"ChatGPT","url":"https://chat.openai.com","icon":"🤖","category":"tech"},{"name":"Cloudflare","url":"https://dash.cloudflare.com","icon":"☁️","category":"tech"},{"name":"知乎","url":"https://zhihu.com","icon":"💭","category":"social"},{"name":"微博","url":"https://weibo.com","icon":"📝","category":"social"},{"name":"微信","url":"https://weixin.qq.com","icon":"💬","category":"social"},{"name":"小红书","url":"https://xiaohongshu.com","icon":"📕","category":"social"},{"name":"Bilibili","url":"https://bilibili.com","icon":"📺","category":"social"},{"name":"抖音","url":"https://douyin.com","icon":"🎵","category":"social"},{"name":"豆瓣","url":"https://douban.com","icon":"🎬","category":"social"},{"name":"贴吧","url":"https://tieba.baidu.com","icon":"�️","category":"social"},{"name":"Twitter/X","url":"https://twitter.com","icon":"🐦","category":"social"},{"name":"Reddit","url":"https://reddit.com","icon":"🤭","category":"social"},{"name":"33","url":"https://juejin.cn/","icon":"📌","category":"common"}]};
function render(){
  const search=(document.getElementById('searchInput').value||'').toLowerCase();
  const groups={};
  data.categories.forEach(c=>groups[c.id]={cat:c,sites:[]});
  data.sites.filter(s=>s.name.toLowerCase().includes(search)||s.url.toLowerCase().includes(search)).forEach(s=>{if(groups[s.category])groups[s.category].sites.push(s)});
  let html='';
  Object.values(groups).filter(g=>g.sites.length>0).forEach(g=>{
    html+='<div class="category"><div class="category-title">'+g.cat.icon+' '+g.cat.name+'</div><div class="sites-grid">';
    g.sites.forEach(s=>{html+='<a href="'+s.url+'" class="site-card" target="_blank"><span class="site-icon">'+s.icon+'</span><span class="site-name">'+s.name+'</span></a>'});
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html||'';
}
render();
document.getElementById('searchInput').addEventListener('input',render);</script>
</body>
</html>
