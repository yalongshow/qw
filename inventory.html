
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易进销存系统</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        /* 仪表盘 */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #6b7280; }
        .card .value { font-size: 1.8rem; font-weight: bold; color: var(--primary); }

        /* 表单区域 */
        .section { background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .section h2 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.9rem; margin-bottom: 5px; color: #4b5563; }
        input, select { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-add { background: var(--primary); color: white; }
        .btn-in { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; }
        .btn-reset { background: #6b7280; color: white; margin-top: 10px; font-size: 0.8rem; }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        tr:hover { background: #f9fafb; }
        .stock-low { color: var(--danger); font-weight: bold; }

        /* 标签 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 简易进销存管理系统</h1>

    <!-- 数据概览 -->
    <div class="dashboard">
        <div class="card">
            <h3>商品种类</h3>
            <div class="value" id="total-types">0</div>
        </div>
        <div class="card">
            <h3>库存总数量</h3>
            <div class="value" id="total-stock">0</div>
        </div>
        <div class="card">
            <h3>库存总资产 (元)</h3>
            <div class="value" id="total-assets">0.00</div>
        </div>
    </div>

    <!-- 1. 商品管理 -->
    <div class="section">
        <h2>🛒 商品录入</h2>
        <div class="form-group">
            <div class="input-group">
                <label>商品名称</label>
                <input type="text" id="prod-name" placeholder="例如：苹果">
            </div>
            <div class="input-group">
                <label>单价 (元)</label>
                <input type="number" id="prod-price" placeholder="0.00" step="0.01">
            </div>
            <button class="btn-add" onclick="addProduct()">添加商品</button>
        </div>
    </div>

    <!-- 2. 出入库操作 -->
    <div class="section">
        <h2>🔄 出入库操作</h2>
        <div class="form-group">
            <div class="input-group">
                <label>选择商品</label>
                <select id="action-product"></select>
            </div>
            <div class="input-group">
                <label>操作类型</label>
                <select id="action-type">
                    <option value="in">入库 (进货)</option>
                    <option value="out">出库 (销售)</option>
                </select>
            </div>
            <div class="input-group">
                <label>数量</label>
                <input type="number" id="action-qty" placeholder="0" min="1">
            </div>
            <button class="btn-in" id="btn-action" onclick="handleStock('in')">确认入库</button>
        </div>
    </div>

    <!-- 3. 库存列表 -->
    <div class="section">
        <h2>📋 库存明细</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>商品名称</th>
                    <th>单价</th>
                    <th>当前库存</th>
                    <th>资产价值</th>
                    <th>最近操作</th>
                </tr>
            </thead>
            <tbody id="inventory-table">
                <!-- 数据将在这里渲染 -->
            </tbody>
        </table>
        <button class="btn-reset" onclick="resetData()">⚠️ 清空所有数据</button>
    </div>
</div>

<script>
    // 初始化数据
    let products = JSON.parse(localStorage.getItem('psi_products')) || [];
    let logs = JSON.parse(localStorage.getItem('psi_logs')) || [];

    // 保存数据到本地存储
    function saveData() {
        localStorage.setItem('psi_products', JSON.stringify(products));
        localStorage.setItem('psi_logs', JSON.stringify(logs));
        render();
    }

    // 添加商品
    function addProduct() {
        const name = document.getElementById('prod-name').value.trim();
        const price = parseFloat(document.getElementById('prod-price').value);

        if (!name || isNaN(price)) {
            alert('请输入完整的商品名称和有效价格');
            return;
        }

        const newProduct = {
            id: Date.now(),
            name: name,
            price: price,
            stock: 0,
            lastAction: '-'
        };

        products.push(newProduct);
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-price').value = '';
        saveData();
        alert('商品添加成功！');
    }

    // 处理出入库
    function handleStock(type) {
        const prodId = parseInt(document.getElementById('action-product').value);
        const qty = parseInt(document.getElementById('action-qty').value);
        const actionTypeSelect = document.getElementById('action-type');

        // 同步按钮状态以防切换下拉框未触发事件
        const finalType = actionTypeSelect.value;

        if (!prodId || isNaN(qty) || qty <= 0) {
            alert('请选择商品并输入有效的数量');
            return;
        }

        const product = products.find(p => p.id === prodId);
        if (!product) return;

        if (finalType === 'out') {
            if (product.stock < qty) {
                alert(`库存不足！当前库存仅为 ${product.stock}`);
                return;
            }
            product.stock -= qty;
            product.lastAction = `出库 ${qty}`;
            logs.unshift({ time: new Date().toLocaleString(), type: '出库', name: product.name, qty: qty });
        } else {
            product.stock += qty;
            product.lastAction = `入库 ${qty}`;
            logs.unshift({ time: new Date().toLocaleString(), type: '入库', name: product.name, qty: qty });
        }

        document.getElementById('action-qty').value = '';
        saveData();
    }

    // 监听下拉框变化以改变按钮颜色和文字
    document.getElementById('action-type').addEventListener('change', function(e) {
        const btn = document.getElementById('btn-action');
        if (e.target.value === 'in') {
            btn.className = 'btn-in';
            btn.innerText = '确认入库';
        } else {
            btn.className = 'btn-out';
            btn.innerText = '确认出库';
        }
    });

    // 渲染界面
    function render() {
        const tableBody = document.getElementById('inventory-table');
        const selectBox = document.getElementById('action-product');

        // 更新统计
        const totalTypes = products.length;
        const totalStock = products.reduce((sum, p) => sum + p.stock, 0);
        const totalAssets = products.reduce((sum, p) => sum + (p.stock * p.price), 0);

        document.getElementById('total-types').innerText = totalTypes;
        document.getElementById('total-stock').innerText = totalStock;
        document.getElementById('total-assets').innerText = totalAssets.toFixed(2);

        // 渲染表格
        tableBody.innerHTML = '';
        selectBox.innerHTML = '<option value="">-- 选择商品 --</option>';

        if (products.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">暂无商品，请先在上方添加</td></tr>';
            return;
        }

        products.forEach(p => {
            // 填充表格
            const row = `
                <tr>
                    <td>${p.id.toString().slice(-4)}</td>
                    <td>${p.name}</td>
                    <td>¥${p.price.toFixed(2)}</td>
                    <td class="${p.stock < 5 ? 'stock-low' : ''}">${p.stock}</td>
                    <td>¥${(p.stock * p.price).toFixed(2)}</td>
                    <td><span class="badge ${p.lastAction.includes('入') ? 'badge-in' : 'badge-out'}">${p.lastAction}</span></td>
                </tr>
            `;
            tableBody.innerHTML += row;

            // 填充下拉框
            const option = document.createElement('option');
            option.value = p.id;
            option.text = `${p.name} (余:${p.stock})`;
            selectBox.appendChild(option);
        });
    }

    // 清空数据
    function resetData() {
        if(confirm('确定要清空所有数据吗？此操作不可恢复！')) {
            localStorage.removeItem('psi_products');
            localStorage.removeItem('psi_logs');
            products = [];
            logs = [];
            render();
        }
    }

    // 初始化运行
    render();
</script>

</body>
</html>
